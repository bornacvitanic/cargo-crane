name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: cargo-crane-linux-x86_64.tar.gz
          - os: windows-latest
            asset: cargo-crane-windows-x86_64.zip
          - os: macos-latest
            asset: cargo-crane-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.asset }} -C target/release cargo-crane

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/release/cargo-crane.exe -DestinationPath ${{ matrix.asset }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true
